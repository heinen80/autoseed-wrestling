<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeedIT Live</title>

<style>
body { font-family:sans-serif; background:#020617; color:white; }
.container { max-width:1100px; margin:auto; padding:20px; }
.card { background:rgba(255,255,255,0.05); padding:15px; margin:10px 0; border-radius:10px; }
.row { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(255,255,255,0.1); cursor:pointer; }
button { padding:8px; margin:5px; border:none; border-radius:6px; background:#2563eb; color:white; }
</style>
</head>

<body>

<div class="container">

<div class="card">
<input type="file" id="file">
<button onclick="upload()">Upload</button>
<button onclick="exportSeeds()">Export Bracket</button>
</div>

<div id="weights"></div>
<div id="main"></div>
<div id="details"></div>

</div>

<script>

let data={}, currentWeight=null, currentPair=null;

// ---------------- UPLOAD
async function upload(){
 let f=document.getElementById("file").files[0];
 let fd=new FormData();
 fd.append("file",f);

 let res=await fetch("https://autoseed-backend.onrender.com/upload/",{method:"POST",body:fd});
 data=await res.json();

 renderWeights();
}

// ---------------- WEIGHTS
function renderWeights(){
 let html="";
 for(let w in data){
  html+=`<button onclick="selectWeight('${w}')">${w}</button>`;
 }
 document.getElementById("weights").innerHTML=html;
}

// ---------------- SELECT WEIGHT
async function selectWeight(w){
 currentWeight=w;

 await fetch(`https://autoseed-backend.onrender.com/session/${w}`,{method:"POST"});

 renderWeight();
}

// ---------------- RENDER WEIGHT
function renderWeight(){
 let g=data[currentWeight];
 let html=`<div class="card"><h2>${currentWeight}</h2>`;

 g.seeds.forEach((s,i)=>{
   html+=`<div class="row" onclick="compare(${i})">
   ${s[0]}. ${s[1]}
   <span>${g.confidence[s[1]]}% | SOS ${g.sos[s[1]]}</span>
   </div>`;
 });

 html+="</div>";

 document.getElementById("main").innerHTML=html;
}

// ---------------- COMPARE
function compare(i){
 let g=data[currentWeight];
 if(i===g.seeds.length-1) return;

 let a=g.seeds[i][1];
 let b=g.seeds[i+1][1];

 currentPair=[a,b];

 runCompare(a,b);
}

// ---------------- DECISION ENGINE
function runCompare(a,b){
 let g=data[currentWeight];
 let h=g.history;
 let common=g.common[a][b];

 let adv=0;
 let reasons=[];

 if(h[a].wins.includes(b)){ adv+=5; reasons.push(`${a} beat ${b}`); }
 else if(h[b].wins.includes(a)){ adv-=5; reasons.push(`${b} beat ${a}`); }

 let r1=h[a].wins.length-h[a].losses.length;
 let r2=h[b].wins.length-h[b].losses.length;

 if(r1>r2){ adv+=2; reasons.push(`${a} better record`); }
 else if(r2>r1){ adv-=2; reasons.push(`${b} better record`); }

 common.forEach(c=>{
   if(c.w1==="W" && c.w2==="L"){ adv++; }
   if(c.w2==="W" && c.w1==="L"){ adv--; }
 });

 let diff=g.sos[a]-g.sos[b];
 if(diff>0){ adv++; reasons.push(`${a} stronger schedule`); }
 if(diff<0){ adv--; reasons.push(`${b} stronger schedule`); }

 let winner=adv>0?a:adv<0?b:"Too close";

 let html=`<div class="card">
 <h2>${a} vs ${b}</h2>

 ${a}: ${h[a].wins.length}-${h[a].losses.length}<br>
 ${b}: ${h[b].wins.length}-${h[b].losses.length}<br><br>

 <b>Reasons:</b><br>${reasons.join("<br>")}

 <h2>🏆 ${winner}</h2>

 <button onclick="vote('${a}')">Vote ${a}</button>
 <button onclick="vote('${b}')">Vote ${b}</button>

 <div id="votes"></div>
 </div>`;

 document.getElementById("details").innerHTML=html;

 pollVotes();
}

// ---------------- VOTE
async function vote(name){
 await fetch(`https://autoseed-backend.onrender.com/vote/${currentWeight}`,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({name})
 });
}

// ---------------- LIVE POLLING
async function pollVotes(){
 setInterval(async ()=>{
   let res=await fetch(`https://autoseed-backend.onrender.com/votes/${currentWeight}`);
   let v=await res.json();

   let html="<b>Live Votes:</b><br>";
   for(let k in v.votes){
     html+=`${k}: ${v.votes[k]}<br>`;
   }

   document.getElementById("votes").innerHTML=html;
 },2000);
}

// ---------------- EXPORT
function exportSeeds(){
 let g=data[currentWeight];
 let rows=["Seed,Wrestler"];

 g.seeds.forEach(s=>{
   rows.push(`${s[0]},${s[1]}`);
 });

 let blob=new Blob([rows.join("\n")],{type:"text/csv"});
 let url=URL.createObjectURL(blob);

 let a=document.createElement("a");
 a.href=url;
 a.download="seeds.csv";
 a.click();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>SeedIT Wrestling</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 5px;
    }

    h2 {
      margin-top: 30px;
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }

    p {
      color: #555;
    }

    input {
      margin: 20px 0;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .section {
      text-align: left;
      margin-top: 20px;
    }

    .card {
      background: #f9fafb;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
    }

    .clickable {
      cursor: pointer;
    }

    .clickable:hover {
      background: #e0ecff;
    }

    #details {
      margin-top: 30px;
      padding: 15px;
      background: #eef2ff;
      border-radius: 8px;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>SeedIT Wrestling</h1>
  <p>Upload match data to generate seeds, brackets, and explanations</p>

  <input type="file" id="file">
  <br>
  <button onclick="upload()">Generate Seeds</button>

  <div id="results"></div>
  <div id="details"></div>

</div>

<script>

let globalData = {};

async function upload(){
    try {
        let file = document.getElementById('file').files[0];

        if (!file) {
            alert("Please upload a CSV file");
            return;
        }

        let formData = new FormData();
        formData.append("file", file);

        let res = await fetch("https://autoseed-backend.onrender.com/upload/", {
            method:"POST",
            body: formData
        });

        let data = await res.json();
        globalData = data;

        let output = "";

        for (let weight in data) {
            let group = data[weight];

            output += `<h2>Weight ${weight}</h2>`;

            // Seeds
            output += "<div class='section'><h3>Seeds</h3>";
            group.seeds.forEach(s => {
                output += `<div class="card clickable" data-name="${s[1]}" data-weight="${weight}">
                    ${s[0]}. ${s[1]}
                </div>`;
            });
            output += "</div>";

            // Bracket
            output += "<div class='section'><h3>Bracket</h3>";
            group.bracket.forEach(b => {
                output += `<div class="card">${b[0]} vs ${b[1]}</div>`;
            });
            output += "</div>";
        }

        document.getElementById("results").innerHTML = output;
        document.getElementById("details").innerHTML = "";

    } catch (err) {
        console.error(err);
        alert("Error processing file");
    }
}


// Click handler for wrestler details
document.addEventListener("click", function(e) {
    if (e.target.classList.contains("clickable")) {

        let name = e.target.getAttribute("data-name");
        let weight = e.target.getAttribute("data-weight");

        let h = globalData[weight].history[name];
        let reasons = globalData[weight].reasons[name];

        let html = `<h3>${name} (${weight})</h3>`;

        html += "<strong>Wins:</strong><br>";
        if (h.wins.length === 0) html += "None<br>";
        h.wins.forEach(w => html += `✔ ${w}<br>`);

        html += "<br><strong>Losses:</strong><br>";
        if (h.losses.length === 0) html += "None<br>";
        h.losses.forEach(l => html += `❌ ${l}<br>`);

        html += "<br><strong>Why Seeded Here:</strong><br>";
        reasons.forEach(r => html += `⭐ ${r}<br>`);

        document.getElementById("details").innerHTML = html;
    }
});

</script>

</body>
</html>

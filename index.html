<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeedIT Presentation</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    background: #020617;
    color: white;
    margin:0;
}

.container { max-width:1200px; margin:auto; padding:20px; }

.header {
    text-align:center;
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
}

.sub { text-align:center; opacity:.7; margin-bottom:20px; }

.card {
    background: rgba(255,255,255,0.05);
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

.row {
    display:flex;
    justify-content:space-between;
    padding:14px;
    border-bottom:1px solid rgba(255,255,255,0.1);
    cursor:pointer;
    font-size:18px;
}

.row:hover { background:rgba(255,255,255,0.08); }

.lock { color:#22c55e; }
.lean { color:#facc15; }
.debate { color:#ef4444; }

button {
    padding:10px 14px;
    border:none;
    border-radius:8px;
    margin:5px;
    background:#2563eb;
    color:white;
    font-weight:bold;
}

.bigDecision {
    text-align:center;
    font-size:26px;
    margin-top:15px;
    padding:15px;
    background:rgba(255,255,255,0.08);
    border-radius:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">🏆 SeedIT Presentation Mode</div>
<div class="sub">Run your seeding meeting</div>

<div class="card">
<input type="file" id="file">
<button onclick="upload()">Load Season Data</button>
</div>

<div id="controls" class="card"></div>
<div id="main"></div>
<div id="details"></div>

</div>

<script>

let data={};
let currentWeight=null;
let debateQueue=[];

async function upload(){
 let f=document.getElementById("file").files[0];
 let fd=new FormData();
 fd.append("file",f);

 let res=await fetch("https://autoseed-backend.onrender.com/upload/",{
  method:"POST",
  body:fd
 });

 data=await res.json();

 buildWeightSelector();
}

function buildWeightSelector(){
 let html="<b>Select Weight:</b><br>";

 for(let w in data){
  html+=`<button onclick="showWeight('${w}')">${w}</button>`;
 }

 html+=`<br><br><button onclick="runDebateMode()">⚠ Run Debate Queue</button>`;

 document.getElementById("controls").innerHTML=html;
}

function getTier(c){
 if(c>=85) return "lock";
 if(c>=65) return "lean";
 return "debate";
}

function showWeight(w){
 currentWeight=w;
 let g=data[w];

 let html=`<div class="card"><h2>Weight ${w}</h2>`;

 g.seeds.forEach((s,i)=>{
  let conf=g.confidence[s[1]]||0;
  let tier=getTier(conf);

  html+=`<div class="row" onclick="comparePair(${i})">
  ${s[0]}. ${s[1]}
  <span class="${tier}">${conf}% | SOS ${g.sos[s[1]]}</span>
  </div>`;
 });

 html+="</div>";

 document.getElementById("main").innerHTML=html;

 buildDebateQueue(w);
}

function buildDebateQueue(w){
 let g=data[w];
 debateQueue=[];

 g.seeds.forEach((s,i)=>{
  if(i===g.seeds.length-1) return;

  let a=s[1];
  let b=g.seeds[i+1][1];

  let diff=Math.abs(g.confidence[a]-g.confidence[b]);

  if(diff<8){
    debateQueue.push([a,b]);
  }
 });
}

function runDebateMode(){
 if(!currentWeight) return;

 if(!debateQueue.length){
  document.getElementById("details").innerHTML="<b>No major debates</b>";
  return;
 }

 let [a,b]=debateQueue.shift();
 runCompare(a,b);
}

function comparePair(i){
 let g=data[currentWeight];

 if(i===g.seeds.length-1) return;

 let a=g.seeds[i][1];
 let b=g.seeds[i+1][1];

 runCompare(a,b);
}

function runCompare(a,b){
 let g=data[currentWeight];
 let h=g.history;
 let common=g.common[a][b];

 let adv=0;
 let reasons=[];

 // H2H
 if(h[a].wins.includes(b)){ adv+=5; reasons.push(`${a} beat ${b}`); }
 else if(h[b].wins.includes(a)){ adv-=5; reasons.push(`${b} beat ${a}`); }

 // RECORD
 let r1=h[a].wins.length-h[a].losses.length;
 let r2=h[b].wins.length-h[b].losses.length;

 if(r1>r2){ adv+=2; reasons.push(`${a} better record`); }
 else if(r2>r1){ adv-=2; reasons.push(`${b} better record`); }

 // COMMON
 common.forEach(c=>{
  if(c.w1==="W" && c.w2==="L"){ adv++; reasons.push(`${a} better vs ${c.opponent}`); }
  if(c.w2==="W" && c.w1==="L"){ adv--; reasons.push(`${b} better vs ${c.opponent}`); }
 });

 // SOS
 let diff=g.sos[a]-g.sos[b];
 if(diff>0){ adv+=1; reasons.push(`${a} stronger schedule`); }
 if(diff<0){ adv-=1; reasons.push(`${b} stronger schedule`); }

 let winner=adv>1?a:adv<-1?b:"Toss-up";

 let html=`<div class="card">
 <h2>${a} vs ${b}</h2>

 <b>Records:</b><br>
 ${a}: ${h[a].wins.length}-${h[a].losses.length}<br>
 ${b}: ${h[b].wins.length}-${h[b].losses.length}<br><br>

 <b>Key Factors:</b><br>
 ${reasons.join("<br>")}

 <div class="bigDecision">
 🏆 RECOMMENDED: ${winner}
 </div>
 </div>`;

 document.getElementById("details").innerHTML=html;
}

</script>

</body>
</html>

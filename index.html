<!DOCTYPE html>
<html>
<head>
  <title>SeedIT Wrestling</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 5px;
      color: #1e3a8a;
    }

    h2 {
      margin-top: 30px;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 5px;
      color: #1e3a8a;
    }

    h3 {
      margin-bottom: 5px;
    }

    p {
      color: #555;
    }

    textarea {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    input {
      margin-top: 10px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      margin: 8px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .download-btn {
      background: #059669;
    }

    .download-btn:hover {
      background: #047857;
    }

    .section {
      text-align: left;
      margin-top: 20px;
    }

    .card {
      background: #f9fafb;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      transition: 0.2s;
    }

    .clickable {
      cursor: pointer;
    }

    .clickable:hover {
      background: #dbeafe;
      transform: translateX(3px);
    }

    #details {
      margin-top: 30px;
      padding: 20px;
      background: #eef2ff;
      border-radius: 10px;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>SeedIT Wrestling</h1>
  <p>Generate fair, explainable tournament seeds instantly</p>

  <!-- Upload -->
  <input type="file" id="file"><br>
  <button onclick="upload()">Upload CSV</button>

  <hr>

  <!-- Paste -->
  <h3>Paste Match Results</h3>
  <textarea id="pasteInput" rows="7" placeholder="Smith dec Adams"></textarea><br>
  <button onclick="pasteImport()">Convert & Seed</button>

  <!-- Download -->
  <button class="download-btn" onclick="downloadCSV()">Download Seeds</button>

  <div id="results"></div>
  <div id="details"></div>

</div>

<script>

let globalData = {};

// -------------------
// Upload CSV
// -------------------
async function upload(){
    let file = document.getElementById('file').files[0];

    if (!file) {
        alert("Upload a CSV file");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    try {
        let res = await fetch("https://autoseed-backend.onrender.com/upload/", {
            method:"POST",
            body: formData
        });

        let text = await res.text();

        // 👇 SHOW RAW RESPONSE ON SCREEN
        document.getElementById("results").innerHTML =
            "<pre style='text-align:left'>" + text + "</pre>";

        let data = JSON.parse(text);

        globalData = data;

        renderResults(data);

    } catch (err) {
        document.getElementById("results").innerHTML =
            "<b style='color:red'>Upload failed:</b><br>" + err;
    }
}
// -------------------
// Paste Import
// -------------------
async function pasteImport(){
    let text = document.getElementById("pasteInput").value;

    if (!text) {
        alert("Paste results first");
        return;
    }

    let lines = text.split("\n");
    let matches = [];

    lines.forEach(line => {
        line = line.trim();

        let parts = line.split(/dec|def|pin|tf|maj/i);

        if (parts.length >= 2) {
            matches.push({
                wrestlerA: parts[0].trim(),
                wrestlerB: parts[1].trim(),
                winner: parts[0].trim(),
                weight: "unknown"
            });
        }
    });

    let res = await fetch("https://autoseed-backend.onrender.com/upload/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ matches })
    });

    let data = await res.json();
    globalData = data;

    renderResults(data);
}

// -------------------
// Render Results
// -------------------
function renderResults(data){
    let output = "";

    for (let weight in data){
        let group = data[weight];

        output += `<h2>Weight ${weight}</h2>`;

        output += "<div class='section'><h3>Seeds</h3>";
        group.seeds.forEach(s => {
            output += `<div class="card clickable" data-name="${s[1]}" data-weight="${weight}">
                ${s[0]}. ${s[1]}
            </div>`;
        });
        output += "</div>";

        output += "<div class='section'><h3>Bracket</h3>";
        group.bracket.forEach(b => {
            output += `<div class="card">${b[0]} vs ${b[1]}</div>`;
        });
        output += "</div>";
    }

    document.getElementById("results").innerHTML = output;
    document.getElementById("details").innerHTML = "";
}
function compareWrestlers(weight){
    let names = Object.keys(globalData[weight].history);

    let w1 = prompt("Enter first wrestler name:");
    let w2 = prompt("Enter second wrestler name:");

    if (!globalData[weight].history[w1] || !globalData[weight].history[w2]){
        alert("Invalid names");
        return;
    }

    let h = globalData[weight].history;

    let html = `<h3>Comparison: ${w1} vs ${w2}</h3>`;

    html += `<strong>${w1} wins:</strong> ${h[w1].wins.length}<br>`;
    html += `<strong>${w2} wins:</strong> ${h[w2].wins.length}<br>`;

    if (h[w1].wins.includes(w2)){
        html += "⭐ Head-to-head: " + w1 + "<br>";
    } else if (h[w2].wins.includes(w1)){
        html += "⭐ Head-to-head: " + w2 + "<br>";
    }

    document.getElementById("details").innerHTML = html;
}
// -------------------
// Click Details
// -------------------
document.addEventListener("click", function(e){
    if (e.target.classList.contains("clickable")){

        let name = e.target.dataset.name;
        let weight = e.target.dataset.weight;

        let h = globalData[weight].history[name];
        let reasons = globalData[weight].reasons[name];

        let html = `<h3>${name} (${weight})</h3>`;

        html += "<strong>Wins:</strong><br>";
        if (!h.wins.length) html += "None<br>";
        h.wins.forEach(w => html += `✔ ${w}<br>`);

        html += "<br><strong>Losses:</strong><br>";
        if (!h.losses.length) html += "None<br>";
        h.losses.forEach(l => html += `❌ ${l}<br>`);

        html += "<br><strong>Why Seeded Here:</strong><br>";
        reasons.forEach(r => html += `⭐ ${r}<br>`);

        document.getElementById("details").innerHTML = html;
    }
});

// -------------------
// Download CSV
// -------------------
function downloadCSV(){
    let rows = [["Weight","Seed","Wrestler","Score"]];

    for (let weight in globalData){
        let seeds = globalData[weight].seeds;

        seeds.forEach(s => {
            rows.push([weight, s[0], s[1], s[2]]);
        });
    }

    let csv = rows.map(r => r.join(",")).join("\n");

    let blob = new Blob([csv], { type: "text/csv" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "seeds.csv";
    a.click();
}

</script>

</body>
</html>

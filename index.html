<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeedIT Wrestling</title>

<style>
body { font-family: sans-serif; background:#f4f6fb; margin:0;}
.container { max-width:900px; margin:auto; padding:20px;}

.header { text-align:center; margin-bottom:20px;}
.logo { font-size:28px; font-weight:bold; color:#1e3a8a;}

.card { background:white; padding:15px; margin:10px 0; border-radius:10px;}

.seed-row { display:flex; justify-content:space-between; padding:10px; cursor:pointer;}
.seed-row:hover { background:#eef2ff;}

.high{color:green;} .medium{color:orange;} .low{color:red;}

button { padding:10px; border:none; border-radius:6px; margin:5px;}
.primary{background:#3b82f6;color:white;}
.secondary{background:#10b981;color:white;}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <!-- 🔥 REPLACE WITH YOUR LOGO URL -->
    <img src="YOUR_LOGO_URL_HERE" style="height:60px;"><br>
    <div class="logo">SeedIT Wrestling</div>
</div>

<div class="card">
<input type="file" id="file">
<button class="primary" onclick="upload()">Upload CSV</button>
</div>

<div id="results"></div>
<div id="details" class="card"></div>

</div>

<script>

let globalData={};

async function upload(){
 let file=document.getElementById("file").files[0];
 let fd=new FormData();
 fd.append("file",file);

 let res=await fetch("https://autoseed-backend.onrender.com/upload/",{method:"POST",body:fd});
 let data=await res.json();

 globalData=data;
 render(data);
}

function render(data){
 let out="";

 for(let w in data){
  let g=data[w];

  out+=`<div class="card"><h2>${w}</h2>
  <button class="secondary" onclick="compareUI('${w}')">Compare</button>`;

  g.seeds.forEach((s,i)=>{
   let c=g.confidence[s[1]]||0;
   let cls=c>80?"high":c>60?"medium":"low";

   out+=`<div class="seed-row" data-n="${s[1]}" data-w="${w}">
   <span>${s[0]}. ${s[1]}</span>
   <span class="${cls}">${c}% | SOS: ${g.sos[s[1]]}</span>
   </div>`;
  });

  out+="</div>";
 }

 document.getElementById("results").innerHTML=out;
}

document.addEventListener("click",e=>{
 let row=e.target.closest(".seed-row");
 if(!row)return;

 let n=row.dataset.n;
 let w=row.dataset.w;

 let g=globalData[w];
 let h=g.history[n];

 let html=`<h3>${n}</h3>
 Record: ${h.wins.length}-${h.losses.length}<br>
 SOS: ${g.sos[n]}<br>`;

 document.getElementById("details").innerHTML=html;
});

function compareUI(w){
 let names=Object.keys(globalData[w].history);
 let opts=names.map(n=>`<option>${n}</option>`).join("");

 document.getElementById("details").innerHTML=`
 <select id="a">${opts}</select>
 <select id="b">${opts}</select>
 <button onclick="compare('${w}')">Run</button>`;
}

function compare(w){
 let a=document.getElementById("a").value;
 let b=document.getElementById("b").value;

 let g=globalData[w];
 let h=g.history;

 let adv=0;

 if(h[a].wins.includes(b))adv++;
 if(h[b].wins.includes(a))adv--;

 let winner=adv>0?a:adv<0?b:"Toss-up";

 document.getElementById("details").innerHTML=`
 <h3>${a} vs ${b}</h3>
 ${a}: ${h[a].wins.length}-${h[a].losses.length}<br>
 ${b}: ${h[b].wins.length}-${h[b].losses.length}<br><br>
 <b>Recommended: ${winner}</b>`;
}

</script>

</body>
</html>

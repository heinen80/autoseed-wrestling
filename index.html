<!DOCTYPE html>
<html>
<head>
  <title>SeedIT Wrestling</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    input {
      margin: 20px 0;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .results {
      text-align: left;
      margin-top: 30px;
    }

    .section {
      margin-bottom: 20px;
    }

    .card {
      background: #f9fafb;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>SeedIT Wrestling</h1>
  <p>Upload match data to automatically generate seeds and brackets</p>

  <input type="file" id="file">
  <br>
  <button onclick="upload()">Generate Seeds</button>

  <div class="results" id="results"></div>

</div>

<script>
let globalData = {};

async function upload(){
    let file = document.getElementById('file').files[0];
    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch("https://autoseed-backend.onrender.com/upload/", {
        method:"POST",
        body: formData
    });

    let data = await res.json();
    globalData = data;

    let output = "";

    output += "<div class='section'><h3>Seeds (Click a name)</h3>";

data.seeds.forEach(s => {
    output += `<div class="card" data-name="${s[1]}">${s[0]}. ${s[1]}</div>`;
});

output += "</output += "<div class='section'><h3>Seeds (Click a name)</h3>";

data.seeds.forEach(s => {
    output += `<div class="card clickable" data-name="${s[1]}">${s[0]}. ${s[1]}</div>`;
});

output += "</div>";

    output += "<div id='details'></div>";

    document.getElementById("results").innerHTML = output;
}
setTimeout(() => {
    document.querySelectorAll(".card[data-name]").forEach(el => {
        el.addEventListener("click", () => {
            showDetails(el.getAttribute("data-name"));
        });
    });
}, 100);
function showDetails(name){
    let h = globalData.history[name];

    let html = `<div class='section'><h3>Details: ${name}</h3>`;

    html += "<strong>Wins:</strong><br>";
    if (h.wins.length === 0) html += "None<br>";
    h.wins.forEach(w => html += `✔ ${w}<br>`);

    html += "<br><strong>Losses:</strong><br>";
    if (h.losses.length === 0) html += "None<br>";
    h.losses.forEach(l => html += `❌ ${l}<br>`);

    html += "</div>";

    document.getElementById("details").innerHTML = html;
}
  document.addEventListener("click", function(e) {
    if (e.target.classList.contains("clickable")) {
        let name = e.target.getAttribute("data-name");
        showDetails(name);
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeedIT</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.logo {
  width:280px;
  max-width:90%;
  display:block;
  margin:0 auto 10px auto;
}

.sub {
  text-align:center;
  opacity:.7;
  margin-bottom:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius:12px;
  padding:15px;
  margin:10px 0;
}

.row {
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
}

.row:hover {
  background:rgba(255,255,255,0.08);
}

.lock { color:#22c55e; }
.lean { color:#facc15; }
.debate { color:#ef4444; }

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

.secondary { background:#10b981; }
.warn { background:#dc2626; }

.big {
  font-size:22px;
  margin-top:15px;
  text-align:center;
}
  h2 {
  margin: 0;
  font-weight: 600;
}

button {
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<div class="card" style="text-align:center; padding:30px 20px;">
  <img src="https://raw.githubusercontent.com/heinen80/autoseed-wrestling/main/IMG_5539.png" class="logo">

  <h2 style="margin-top:10px;">Run Your Seeding Meeting Before It Starts</h2>

  <div class="sub">
    Head-to-head • Common opponents • Strength of schedule • Live coach voting
  </div>

  <div style="margin-top:15px;">
    <button onclick="document.getElementById('file').click()">Upload Tournament Data</button>
  </div>
</div>

<!-- UPLOAD -->
<div class="card">
  <input type="file" id="file" style="display:none">
  <button onclick="upload()">Upload Season Data</button>
  <button class="secondary" onclick="exportSeeds()">Export Final Seeds</button>
</div>

<!-- WEIGHTS -->
<div id="weights" class="card"></div>

<!-- MAIN -->
<div id="main"></div>

<!-- DETAILS -->
<div id="details" class="card"></div>

</div>

</body>

<script>

const API = "https://autoseed-backend.onrender.com";

let data = {};
let currentWeight = null;
let lockedSeeds = {};
let voteInterval = null;

// ---------------- UPLOAD
async function upload(){
  let f = document.getElementById("file").files[0];
  let fd = new FormData();
  fd.append("file", f);

  let res = await fetch(API + "/upload/", { method:"POST", body:fd });
  data = await res.json();

  renderWeights();
}

// ---------------- WEIGHTS
function renderWeights(){
  let html = "<b>Select Weight:</b><br>";

  for(let w in data){
    html += `<button onclick="selectWeight('${w}')">${w}</button>`;
  }

  document.getElementById("weights").innerHTML = html;
}

// ---------------- SELECT WEIGHT
async function selectWeight(w){
  currentWeight = w;

  await fetch(API + `/session/${w}`, { method:"POST" });

  if(!lockedSeeds[w]){
    lockedSeeds[w] = data[w].seeds.map(s => s[1]);
  }

  renderWeight();
}

// ---------------- RENDER WEIGHT
function getTier(c){
  if(c>=85) return "lock";
  if(c>=65) return "lean";
  return "debate";
}

function renderWeight(){
  let g = data[currentWeight];
  let order = lockedSeeds[currentWeight];

  let html = `<div class="card"><h2>Weight ${currentWeight}</h2>
  <button onclick="runDebateQueue()">⚠ Debate Queue</button>`;

  order.forEach((name,i)=>{
    let conf = g.confidence[name] || 0;
    let tier = getTier(conf);

    html += `<div class="row" onclick="compareIndex(${i})">
      ${i+1}. ${name}
      <span class="${tier}">${conf}% | SOS ${g.sos[name]}</span>
    </div>`;
  });

  html += "</div>";

  document.getElementById("main").innerHTML = html;
}

// ---------------- COMPARE
function compareIndex(i){
  let order = lockedSeeds[currentWeight];
  if(i === order.length - 1) return;

  runCompare(order[i], order[i+1]);
}

// ---------------- DECISION ENGINE
async function runCompare(a,b){

  await fetch(API + `/session/${currentWeight}`, { method:"POST" });

  let g = data[currentWeight];
  let h = g.history;
  let common = g.common[a][b];

  let adv = 0;
  let reasons = [];

  if(h[a].wins.includes(b)){ adv+=5; reasons.push(`${a} beat ${b}`); }
  else if(h[b].wins.includes(a)){ adv-=5; reasons.push(`${b} beat ${a}`); }

  let r1 = h[a].wins.length - h[a].losses.length;
  let r2 = h[b].wins.length - h[b].losses.length;

  if(r1>r2){ adv+=2; reasons.push(`${a} better record`); }
  else if(r2>r1){ adv-=2; reasons.push(`${b} better record`); }

  common.forEach(c=>{
    if(c.w1==="W" && c.w2==="L"){
      adv+=2;
      reasons.push(`${a} better vs ${c.opponent}`);
    }
    if(c.w2==="W" && c.w1==="L"){
      adv-=2;
      reasons.push(`${b} better vs ${c.opponent}`);
    }
  });

  let diff = g.sos[a] - g.sos[b];
  if(diff>0){ adv+=1; reasons.push(`${a} stronger schedule`); }
  if(diff<0){ adv-=1; reasons.push(`${b} stronger schedule`); }

  let winner = adv>0 ? a : adv<0 ? b : "Too close";

  document.getElementById("details").innerHTML = `
    <h2>${a} vs ${b}</h2>

    ${a}: ${h[a].wins.length}-${h[a].losses.length}<br>
    ${b}: ${h[b].wins.length}-${h[b].losses.length}<br><br>

    <b>Key Factors:</b><br>${reasons.join("<br>")}

    <div class="big">🏆 Recommended: ${winner}</div>

    <button onclick="vote('${a}')">Vote ${a}</button>
    <button onclick="vote('${b}')">Vote ${b}</button>

    <div id="votes"></div>

    <button class="secondary" onclick="swap('${a}','${b}')">Swap Seeds</button>
  `;

  pollVotes();
}

// ---------------- VOTE
async function vote(name){
  await fetch(API + `/vote/${currentWeight}`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ name })
  });
}

// ---------------- POLL (FIXED)
function pollVotes(){
  if(voteInterval) clearInterval(voteInterval);

  voteInterval = setInterval(async ()=>{
    let res = await fetch(API + `/votes/${currentWeight}`);
    let v = await res.json();

    let html = "<b>Live Votes:</b><br>";
    for(let k in v.votes){
      html += `${k}: ${v.votes[k]}<br>`;
    }

    document.getElementById("votes").innerHTML = html;
  },2000);
}

// ---------------- SWAP
function swap(a,b){
  let arr = lockedSeeds[currentWeight];
  let i = arr.indexOf(a);
  let j = arr.indexOf(b);
  [arr[i], arr[j]] = [arr[j], arr[i]];
  renderWeight();
}

// ---------------- DEBATE QUEUE
function runDebateQueue(){
  let g = data[currentWeight];
  let order = lockedSeeds[currentWeight];

  for(let i=0;i<order.length-1;i++){
    let a=order[i];
    let b=order[i+1];

    let diff = Math.abs((g.confidence[a]||0)-(g.confidence[b]||0));

    if(diff<8){
      runCompare(a,b);
      return;
    }
  }

  alert("No major debates");
}

// ---------------- EXPORT
function exportSeeds(){
  let order = lockedSeeds[currentWeight];

  let rows = ["Seed,Wrestler"];
  order.forEach((w,i)=>{
    rows.push(`${i+1},${w}`);
  });

  let blob = new Blob([rows.join("\n")], {type:"text/csv"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "final_seeds.csv";
  a.click();
}

</script>

</body>
</html>
